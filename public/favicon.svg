<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="planGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="realGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0f1117"/>

  <!-- Subtle border -->
  <rect width="512" height="512" rx="112"
        fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>

  <!-- Baseline -->
  <rect x="96" y="368" width="320" height="3" rx="1.5" fill="rgba(255,255,255,0.15)"/>

  <!-- Plan bar (left, blue) — the "plan" -->
  <rect x="118" y="148" width="108" height="220" rx="14"
        fill="url(#planGrad)" filter="url(#glow)" opacity="0.92"/>

  <!-- Reality bar (right, green) — reality came up shorter -->
  <rect x="286" y="198" width="108" height="170" rx="14"
        fill="url(#realGrad)" filter="url(#glow)" opacity="0.92"/>

  <!-- Dashed gap line between bar tops to show divergence -->
  <line x1="226" y1="148" x2="286" y2="198"
        stroke="rgba(255,255,255,0.25)" stroke-width="3"
        stroke-dasharray="8,6" stroke-linecap="round"/>

  <!-- Top cap dots -->
  <circle cx="172" cy="148" r="7" fill="white" opacity="0.6"/>
  <circle cx="340" cy="198" r="7" fill="white" opacity="0.6"/>

</svg>
